<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UZBLAIN Performance</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=Bebas+Neue&display=swap');

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #000000;
            --dark: #0a0a0a;
            --dark2: #111111;
            --dark3: #1a1a1a;
            --white: #ffffff;
            --gray: #888888;
            --gray2: #555555;
            --blue: #00AEEF;
            --blue-dim: rgba(0, 174, 239, 0.15);
            --blue-glow: rgba(0, 174, 239, 0.4);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            cursor: none;
        }

        /* CUSTOM CURSOR */
        .cursor {
            width: 10px;
            height: 10px;
            background: var(--blue);
            border-radius: 50%;
            position: fixed;
            z-index: 9999;
            pointer-events: none;
            transition: transform 0.1s ease;
        }

        .cursor-ring {
            width: 36px;
            height: 36px;
            border: 1px solid rgba(0, 174, 239, 0.6);
            border-radius: 50%;
            position: fixed;
            z-index: 9998;
            pointer-events: none;
            transition: transform 0.3s ease, width 0.3s ease, height 0.3s ease;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 3px;
        }

        ::-webkit-scrollbar-track {
            background: var(--black);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--blue);
        }

        /* NAV */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 24px 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.4s ease;
        }

        nav.scrolled {
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(20px);
            padding: 16px 60px;
            border-bottom: 1px solid rgba(0, 174, 239, 0.1);
        }

        .nav-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 0.12em;
            color: var(--white);
            text-decoration: none;
        }

        .nav-logo span {
            color: var(--blue);
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-links a {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.65);
            text-decoration: none;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--blue);
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--white);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-cta {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--blue);
            border: 1px solid var(--blue);
            padding: 10px 24px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .nav-cta:hover {
            background: var(--blue);
            color: var(--black);
        }

        /* ── LANGUAGE SWITCHER ── YANGI QO'SHILDI */
        .lang-switcher {
            position: relative;
            margin-left: 24px;
            flex-shrink: 0;
        }

        .lang-btn {
            display: flex;
            align-items: center;
            gap: 7px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 8px 14px;
            cursor: none;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .lang-btn:hover {
            border-color: var(--blue);
            color: var(--blue);
        }

        .lang-btn .lang-flag {
            font-size: 1rem;
            line-height: 1;
        }

        .lang-btn .lang-chevron {
            font-size: 0.6rem;
            opacity: 0.6;
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .lang-switcher.open .lang-chevron {
            transform: rotate(180deg);
        }

        .lang-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: rgba(10, 10, 10, 0.97);
            border: 1px solid rgba(0, 174, 239, 0.2);
            backdrop-filter: blur(20px);
            min-width: 140px;
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 200;
        }

        .lang-switcher.open .lang-dropdown {
            display: flex;
        }

        .lang-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            cursor: none;
            transition: all 0.25s ease;
            border: none;
            background: transparent;
            text-align: left;
            width: 100%;
        }

        .lang-option:hover {
            background: rgba(0, 174, 239, 0.08);
            color: var(--white);
        }

        .lang-option.active {
            color: var(--blue);
            background: rgba(0, 174, 239, 0.06);
        }

        .lang-option .lang-flag {
            font-size: 1.1rem;
        }

        /* ── / LANGUAGE SWITCHER ── */

        /* HERO */
        #hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-video-wrap {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .hero-video-wrap video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.45) saturate(0.7);
        }

        .hero-bg-fallback {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 60% 40%, rgba(0, 80, 120, 0.25) 0%, transparent 65%),
                radial-gradient(ellipse 50% 40% at 80% 70%, rgba(0, 174, 239, 0.08) 0%, transparent 55%),
                linear-gradient(160deg, #000 0%, #0a0f14 40%, #000 100%);
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: linear-gradient(to bottom,
                    rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.15) 40%,
                    rgba(0, 0, 0, 0.6) 80%, rgba(0, 0, 0, 1) 100%);
        }

        .hero-grid {
            position: absolute;
            inset: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(0, 174, 239, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 174, 239, 0.04) 1px, transparent 1px);
            background-size: 80px 80px;
            mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 0%, transparent 100%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 0 20px;
            max-width: 1000px;
        }

        .hero-eyebrow {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--blue);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        .hero-eyebrow::before,
        .hero-eyebrow::after {
            content: '';
            width: 40px;
            height: 1px;
            background: var(--blue);
            opacity: 0.6;
        }

        .hero-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(4rem, 11vw, 10rem);
            line-height: 0.9;
            letter-spacing: 0.04em;
            color: var(--white);
            margin-bottom: 8px;
        }

        .hero-title span {
            color: var(--blue);
            display: block;
            font-size: clamp(2.2rem, 6vw, 5.5rem);
            letter-spacing: 0.18em;
        }

        .hero-divider {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--blue), transparent);
            margin: 28px auto;
        }

        .hero-quote {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(1rem, 2.2vw, 1.35rem);
            font-weight: 300;
            letter-spacing: 0.06em;
            color: rgba(255, 255, 255, 0.55);
            font-style: italic;
            margin-bottom: 52px;
            max-width: 620px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.7;
        }

        .hero-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--black);
            background: var(--blue);
            border: none;
            padding: 18px 42px;
            cursor: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.35s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(-100%) skewX(-15deg);
            transition: transform 0.4s ease;
        }

        .btn-primary:hover::before {
            transform: translateX(110%) skewX(-15deg);
        }

        .btn-primary:hover {
            box-shadow: 0 0 30px rgba(0, 174, 239, 0.5);
        }

        .btn-secondary {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--white);
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 18px 42px;
            cursor: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.35s ease;
        }

        .btn-secondary:hover {
            border-color: var(--blue);
            color: var(--blue);
        }

        /* SCROLL INDICATOR */
        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .scroll-indicator span {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.35);
        }

        .scroll-line {
            width: 1px;
            height: 50px;
            background: linear-gradient(to bottom, var(--blue), transparent);
            animation: scrollPulse 2s ease-in-out infinite;
        }

        @keyframes scrollPulse {

            0%,
            100% {
                opacity: 0.3;
                transform: scaleY(1);
            }

            50% {
                opacity: 1;
                transform: scaleY(1.1);
            }
        }

        /* SECTIONS COMMON */
        section {
            padding: 120px 60px;
        }

        .section-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--blue);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-label::before {
            content: '';
            width: 30px;
            height: 1px;
            background: var(--blue);
        }

        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.8rem, 5vw, 5rem);
            letter-spacing: 0.06em;
            line-height: 1;
            color: var(--white);
            margin-bottom: 20px;
        }

        .section-sub {
            font-size: 0.95rem;
            color: var(--gray);
            line-height: 1.8;
            max-width: 520px;
            font-weight: 300;
        }

        .max-w {
            max-width: 1320px;
            margin: 0 auto;
        }

        /* SERVICES */
        #services {
            background: var(--dark);
        }

        .services-header {
            margin-bottom: 72px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2px;
        }

        .service-card {
            background: var(--dark2);
            padding: 44px 36px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            cursor: none;
        }

        .service-card::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--blue);
            transition: width 0.4s ease;
        }

        .service-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0, 174, 239, 0.06) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .service-card:hover {
            background: #161616;
            transform: translateY(-4px);
        }

        .service-card:hover::before {
            width: 100%;
        }

        .service-card:hover::after {
            opacity: 1;
        }

        .service-card:hover .service-icon {
            color: var(--blue);
            transform: scale(1.1);
        }

        .service-icon {
            font-size: 2rem;
            margin-bottom: 20px;
            display: block;
            transition: all 0.4s ease;
        }

        .service-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            color: rgba(255, 255, 255, 0.04);
            position: absolute;
            top: 16px;
            right: 20px;
            line-height: 1;
            letter-spacing: 0.05em;
        }

        .service-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--white);
            margin-bottom: 10px;
        }

        .service-desc {
            font-size: 0.8rem;
            color: var(--gray);
            line-height: 1.7;
        }

        /* GALLERY */
        #gallery {
            background: var(--black);
        }

        .gallery-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 56px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: auto;
            gap: 4px;
        }

        .gallery-item {
            overflow: hidden;
            position: relative;
            background: var(--dark3);
            cursor: none;
        }

        .gallery-item:nth-child(1) {
            grid-column: span 7;
            grid-row: span 2;
            min-height: 480px;
        }

        .gallery-item:nth-child(2) {
            grid-column: span 5;
            min-height: 234px;
        }

        .gallery-item:nth-child(3) {
            grid-column: span 5;
            min-height: 234px;
        }

        .gallery-item:nth-child(4) {
            grid-column: span 4;
            min-height: 280px;
        }

        .gallery-item:nth-child(5) {
            grid-column: span 4;
            min-height: 280px;
        }

        .gallery-item:nth-child(6) {
            grid-column: span 4;
            min-height: 280px;
        }

        .gallery-inner {
            width: 100%;
            height: 100%;
            min-height: inherit;
            position: relative;
            overflow: hidden;
        }



        .gallery-item:hover .gallery-inner {
            transform: scale(1.04);
        }

        .gallery-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.4s ease;
            display: flex;
            align-items: flex-end;
            padding: 24px;
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        .gallery-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--blue);
        }

        .gallery-car {
            width: 100%;
            height: 100%;
            position: absolute;
            inset: 0;
            overflow: hidden;
            display: block;
        }

        /* rasm uchun alohida style */
        .gallery-car img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            transition: transform 0.6s ease;
        }

        .car-silhouette {
            opacity: 0.12;
            transition: opacity 0.4s ease;
        }

        .gallery-item:hover .car-silhouette {
            opacity: 0.22;
        }

        .g1 {
            background: radial-gradient(ellipse at 40% 60%, #0a1a25 0%, #050a0e 100%);
        }

        .g2 {
            background: radial-gradient(ellipse at 60% 50%, #0d1520 0%, #050810 100%);
        }

        .g3 {
            background: radial-gradient(ellipse at 50% 40%, #111820 0%, #080b10 100%);
        }

        .g4 {
            background: radial-gradient(ellipse at 30% 60%, #0a1218 0%, #050810 100%);
        }

        .g5 {
            background: radial-gradient(ellipse at 70% 40%, #0f1a24 0%, #060c12 100%);
        }

        .g6 {
            background: radial-gradient(ellipse at 50% 50%, #0c1520 0%, #050a0f 100%);
        }

        /* ABOUT */
        #about {
            background: var(--dark);
            overflow: hidden;
        }

        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 100px;
            align-items: center;
        }

        .about-visual {
            position: relative;
        }

        .about-img-wrap {
            width: 100%;
            padding-bottom: 120%;
            background: var(--dark2);
            position: relative;
            overflow: hidden;
        }

        .about-img-inner {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 40%, #0c1e2c 0%, #030a10 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .about-accent-line {
            position: absolute;
            right: -20px;
            top: 40px;
            width: 2px;
            height: 60%;
            background: linear-gradient(to bottom, var(--blue), transparent);
        }

        .about-accent-box {
            position: absolute;
            bottom: -24px;
            left: -24px;
            width: 120px;
            height: 120px;
            border: 1px solid rgba(0, 174, 239, 0.2);
            background: var(--dark3);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 4px;
        }

        .about-accent-box .num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.4rem;
            color: var(--blue);
            line-height: 1;
        }

        .about-accent-box .lbl {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gray);
        }

        .features-list {
            margin-top: 48px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 22px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
            cursor: none;
        }

        .feature-item:hover .feature-icon {
            color: var(--blue);
        }

        .feature-item:hover {
            padding-left: 6px;
        }

        .feature-icon {
            font-size: 1.3rem;
            color: rgba(0, 174, 239, 0.6);
            transition: color 0.3s ease;
            flex-shrink: 0;
        }

        .feature-text h4 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--white);
            margin-bottom: 3px;
        }

        .feature-text p {
            font-size: 0.8rem;
            color: var(--gray);
            line-height: 1.6;
        }

        /* STATS STRIP */
        #stats {
            background: var(--blue);
            padding: 0;
        }

        .stats-inner {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
        }

        .stat-item {
            padding: 48px 40px;
            border-right: 1px solid rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        .stat-item:last-child {
            border-right: none;
        }

        .stat-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            color: var(--black);
            line-height: 1;
            letter-spacing: 0.05em;
        }

        .stat-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(0, 0, 0, 0.65);
            margin-top: 6px;
        }

        /* CONTACT */
        #contact {
            background: var(--dark2);
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: start;
        }

        .contact-links {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 40px;
        }

        .contact-link {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: none;
        }

            inset: 0;

            z-index: 9999;

            justify-content: center;

            letter-spacing: 0.2em;

            width: 200px;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .loader-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: var(--blue);
            width: 0;
            animation: load 1.6s ease forwards 0.3s;
        }

        @keyframes load {
            to {
                width: 100%;
            }
        }

        .loader-pct {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.3em;

        .hero-content>* {
            opacity: 0;
            animation: heroFade 0.9s ease forwards;
        }

        .hero-eyebrow {
            animation-delay: 1.9s;
        }

        .hero-title {
            animation-delay: 2.1s;
        }

        .hero-divider {
            animation-delay: 2.3s;
        }

        .hero-quote {
            animation-delay: 2.5s;
        }

        .hero-buttons {
            animation-delay: 2.7s;
        }

        .scroll-indicator {
            opacity: 0;
            animation: heroFade 0.9s ease forwards 3s;
        }

        @keyframes heroFade {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* LIGHTBOX */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9990;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gray);
            cursor: none;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .lightbox-close:hover {
            color: var(--blue);
        }

        /* MARQUEE */
        .marquee-wrap {
            background: var(--dark3);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            padding: 0;
        }

        .marquee-track {
            display: flex;
            white-space: nowrap;
            animation: marquee 25s linear infinite;
            padding: 18px 0;
        }

        .marquee-item {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 0.25em;
            color: rgba(255, 255, 255, 0.2);
            padding: 0 40px;
            display: flex;
            align-items: center;
            gap: 40px;
            flex-shrink: 0;
        }

        .marquee-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--blue);
            display: inline-block;
        }

        @keyframes marquee {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(-50%);
            }
        }

        /* RESPONSIVE */
        @media (max-width: 1100px) {
            .services-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .about-grid {
                grid-template-columns: 1fr;
                gap: 60px;

                grid-template-columns: 1fr;
                gap: 48px;
            }
        }

        @media (max-width: 768px) {

                padding: 32px 24px;
            }

            .footer-inner {
                flex-direction: column;
                gap: 24px;
                text-align: center;
            }
        }
    </style>
</head>

            /* 2. data-i18n-placeholder — input/textarea uchun */
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (t[key] !== undefined) el.placeholder = t[key];
            });

            /* 3. data-i18n-option — select option larning textContent */
            document.querySelectorAll('[data-i18n-option]').forEach(el => {
                const key = el.getAttribute('data-i18n-option');
                if (t[key] !== undefined) el.textContent = t[key];
            });

            /* 4. Marquee elementlari — alohida atribut */
            document.querySelectorAll('[data-i18n-marquee]').forEach(el => {
                const key = el.getAttribute('data-i18n-marquee');
                if (t[key] !== undefined) {
                    /* dot ni saqlagan holda matnni almashtirish */
                    const dot = el.querySelector('.marquee-dot');
                    el.textContent = t[key] + ' ';
                    if (dot) el.appendChild(dot.cloneNode(true));
                }
            });

            /* 5. Tugma ko'rinishini yangilash */
            document.getElementById('currentFlag').textContent = langMeta[lang].flag;
            document.getElementById('currentLangLabel').textContent = langMeta[lang].label;

            /* 6. Active holatini belgilash */
            document.querySelectorAll('.lang-option').forEach(btn => {
                const btnLang = btn.getAttribute('onclick').match(/'(\w+)'/)[1];
                btn.classList.toggle('active', btnLang === lang);
            });

            /* Dropdownni yopish */
            closeLangDropdown();
        }

        /* Dropdown ochish/yopish */
        function toggleLangDropdown() {
            document.getElementById('langSwitcher').classList.toggle('open');
        }
        function closeLangDropdown() {
            document.getElementById('langSwitcher').classList.remove('open');
        }

        /* Tashqariga bosilganda dropdown yopilsin */
        document.addEventListener('click', function (e) {
            const switcher = document.getElementById('langSwitcher');
            if (switcher && !switcher.contains(e.target)) closeLangDropdown();
        });
        /* ── / I18N ── */


        /* ══════════════════════════════════════════
           MAVJUD KOD (o'zgartirilmagan)
        ══════════════════════════════════════════ */

        // LOADER
        let pct = 0;
        const pctEl = document.getElementById('loaderPct');
        const loaderTimer = setInterval(() => {
            pct += Math.random() * 15;
            if (pct >= 100) {
                pct = 100;
                clearInterval(loaderTimer);
                setTimeout(() => {
                    const loader = document.getElementById('loader');
                    loader.style.opacity = '0';
                    loader.style.pointerEvents = 'none';
                    setTimeout(() => loader.style.display = 'none', 600);
                }, 300);
            }
            pctEl.textContent = Math.min(Math.floor(pct), 100) + '%';
        }, 80);

        // VIDEO FALLBACK
        const video = document.getElementById('heroVideo');
        video.addEventListener('canplay', () => {
            video.style.display = 'block';
            document.getElementById('heroBgFallback').style.display = 'none';
        });

        // CURSOR
        const cursor = document.getElementById('cursor');
        const cursorRing = document.getElementById('cursorRing');
        let mx = 0, my = 0, rx = 0, ry = 0;
        document.addEventListener('mousemove', e => {
            mx = e.clientX; my = e.clientY;
            cursor.style.left = mx - 5 + 'px';
            cursor.style.top = my - 5 + 'px';
        });
        function animateRing() {
            rx += (mx - rx) * 0.12;
            ry += (my - ry) * 0.12;
            cursorRing.style.left = rx - 18 + 'px';
            cursorRing.style.top = ry - 18 + 'px';
            requestAnimationFrame(animateRing);
        }
        animateRing();
        document.querySelectorAll('a, button, .service-card, .gallery-item, .feature-item, .contact-link').forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursorRing.style.width = '56px';
                cursorRing.style.height = '56px';
                cursor.style.transform = 'scale(1.5)';
            });
            el.addEventListener('mouseleave', () => {
                cursorRing.style.width = '36px';
                cursorRing.style.height = '36px';
                cursor.style.transform = 'scale(1)';
            });
        });

        // NAV SCROLL
        window.addEventListener('scroll', () => {
            document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 60);
        });

        // AOS
        AOS.init({ duration: 800, easing: 'ease-out', once: true, offset: 60 });

        // MOBILE MENU
        function toggleMobileMenu() {
            const m = document.getElementById('mobileMenu');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }
        function closeMobileMenu() {
            document.getElementById('mobileMenu').style.display = 'none';
        }

        // LIGHTBOX
        function openLightbox() {
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }
        document.getElementById('lightbox').addEventListener('click', function (e) {
            if (e.target === this) closeLightbox();
        });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

        // FORM SUBMIT
        async function submitForm(btn) {
            const name = document.querySelector('input[type="text"]').value.trim();
            const phone = document.querySelector('input[type="tel"]').value.trim();
            const service = document.querySelector('#serviceSelect').value;
            const message = document.querySelector('textarea').value.trim();

            // ❗ FAqat harflar (ism)
            const nameRegex = /^[A-Za-zА-Яа-яЎўҚқҒғҲҳ\s]+$/;

            // ❗ FAqat raqamlar (telefon)
            const phoneRegex = /^[0-9+]+$/;

            if (!name || !phone) {
                alert("Ism va telefon raqamini kiriting!");
                return;
            }

            if (!nameRegex.test(name)) {
                alert("Ism faqat harflardan iborat bo‘lishi kerak!");
                return;
            }

            if (!phoneRegex.test(phone)) {
                alert("Telefon raqam faqat raqamlardan iborat bo‘lishi kerak!");
                return;
            }

            const BOT_TOKEN = "8354686637:AAF_5W_1FaOhn6go2cX9hvu6_vb1tAG1tB8";
            const CHAT_ID = "8690424547";

            const text = `
📩 Yangi buyurtma

👤 Ism: ${name}
📞 Telefon: ${phone}
🔧 Xizmat: ${service}
💬 Xabar: ${message}
`;

            btn.textContent = "Yuborilmoqda...";
            btn.disabled = true;
            btn.style.opacity = "0.7";

            try {
                const response = await fetch(
                    `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            chat_id: CHAT_ID,
                            text: text
                        })
                    }
                );

                const data = await response.json();

                if (!data.ok) {
                    throw new Error(data.description);
                }

                btn.textContent = "✓ Ariza yuborildi!";
                btn.style.background = "#0a8f2e";
                btn.style.color = "#fff";
                btn.style.opacity = "1";

                document.querySelector('input[type="text"]').value = "";
                document.querySelector('input[type="tel"]').value = "";
                document.querySelector('#serviceSelect').selectedIndex = 0;
                document.querySelector('textarea').value = "";

            } catch (error) {
                console.error(error);
                btn.textContent = "Xatolik!";
                btn.style.background = "#c62828";
                btn.style.color = "#fff";
            }

            setTimeout(() => {
                btn.textContent = "Ariza yuborish";
                btn.style.background = "var(--blue)";
                btn.style.color = "var(--black)";
                btn.style.opacity = "1";
                btn.disabled = false;
            }, 3000);
        }

        // SMOOTH SCROLL
        document.querySelectorAll('a[href^="#"]').forEach(a => {
            a.addEventListener('click', e => {
                e.preventDefault();
                const t = document.querySelector(a.getAttribute('href'));
                if (t) t.scrollIntoView({ behavior: 'smooth' });
            });
        });

        /* ── Sahifa yuklanganda saqlangan tilni qo'llash ── */
        changeLanguage(currentLang);
    </script>
